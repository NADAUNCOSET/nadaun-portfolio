<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>NADAUN PHOTO</title>
<meta name="description" content="NADAUN Photo Portfolio — 곧 공개됩니다.">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#F5F4F0;
    --ink:#1a1a1a;
    --muted:#9a958b;
    --accent:#FA5D29;
    --ease:cubic-bezier(.16,1,.3,1);
    --display:"Inter Tight",Pretendard,system-ui,sans-serif;
    --body:Pretendard,"Inter Tight",system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  body{min-height:100svh;display:flex;flex-direction:column;justify-content:space-between;padding:clamp(24px,4vw,48px)}
  header,footer{display:flex;align-items:center;justify-content:space-between;font-size:13px;letter-spacing:.02em;color:var(--muted)}
  header .brand{font-family:var(--display);font-weight:700;letter-spacing:.18em;color:var(--ink);font-size:13px}
  header .status{display:inline-flex;align-items:center;gap:8px}
  header .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 rgba(250,93,41,.6);animation:pulse 2.4s var(--ease) infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(250,93,41,.5)}80%,100%{box-shadow:0 0 0 14px rgba(250,93,41,0)}}
  main{display:flex;flex-direction:column;justify-content:center;gap:24px;padding:8vh 0}
  .eyebrow{font-family:var(--display);text-transform:uppercase;letter-spacing:.3em;font-size:12px;color:var(--muted);opacity:0;transform:translateY(8px);animation:reveal .9s var(--ease) .1s forwards}
  h1{font-family:var(--display);font-weight:500;line-height:.95;letter-spacing:-.03em;font-size:clamp(56px,11vw,184px);margin:0;opacity:0;transform:translateY(20px);animation:reveal 1.1s var(--ease) .25s forwards}
  h1 .accent{color:var(--accent)}
  .sub{max-width:560px;font-size:clamp(15px,1.6vw,18px);line-height:1.6;color:#444;opacity:0;transform:translateY(12px);animation:reveal .9s var(--ease) .5s forwards}
  .meta{display:flex;flex-wrap:wrap;gap:24px 40px;margin-top:8px;font-size:13px;color:var(--muted);opacity:0;animation:reveal .9s var(--ease) .7s forwards}
  .meta div span{color:var(--ink);font-family:var(--display);font-weight:500;display:block;margin-top:4px;font-size:14px}
  @keyframes reveal{to{opacity:1;transform:translateY(0)}}
  footer .small{font-size:12px}
  footer a{color:inherit;text-decoration:none;border-bottom:1px solid transparent;transition:border-color .5s var(--ease),color .5s var(--ease)}
  footer a:hover{color:var(--accent);border-bottom-color:var(--accent)}
  @media (max-width:560px){
    body{padding:20px}
    main{padding:6vh 0}
    .meta{gap:16px 28px}
  }
</style>
</head>
<body>
  <header>
    <div class="brand">NADAUN</div>
    <div class="status"><span class="dot"></span>preparing</div>
  </header>

  <main>
    <div class="eyebrow">Photo Portfolio</div>
    <h1>Coming<br>soon<span class="accent">.</span></h1>
    <p class="sub">사진 작업은 곧 공개됩니다. 큰 이미지, 정직한 디테일, 그리고 가벼운 페이지 ― 그 사이의 균형을 맞추는 중입니다.</p>
    <div class="meta">
      <div>Studio<span>NADAUN</span></div>
      <div>Domain<span>photo.nadaun.co</span></div>
      <div>Status<span>In production</span></div>
    </div>
  </main>

  <footer>
    <div class="small">© NADAUN</div>
    <div class="small"><a href="https://collective.nadaun.co">collective →</a></div>
  </footer>
</body>
</html>
